<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="quizmaker-theme-preference" th:content="${teacherThemePreference}">
    <title>Log in tempo reale — Alice's Simple Quiz Maker</title>
    <script th:src="@{/js/theme-init.js}"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="screen active" style="display:block;">
    <div class="topbar">
        <span class="topbar-title">🧾 Log applicazione</span>
        <a th:href="@{/about}" class="topbar-back" style="text-decoration:none" sec:authorize="hasRole('ADMIN')">← About</a>
        <span class="topbar-badge" sec:authentication="name">admin</span>
        <form th:action="@{/teacher/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="topbar-back">Logout</button>
        </form>
    </div>

    <div class="teacher-body">
        <div class="about-card">
            <div class="log-toolbar">
                <span id="log-status" class="log-status">Aggiornamento automatico ogni 2 secondi</span>
                <div class="log-actions">
                    <button id="toggle-refresh-btn" type="button" class="topbar-back">⏸️ Stop refresh</button>
                    <button id="refresh-logs-btn" type="button" class="topbar-back">Aggiorna ora</button>
                    <button id="copy-logs-btn" type="button" class="topbar-back">📋 Copia log</button>
                </div>
            </div>
            <p id="log-path" class="section-label" style="margin-top: 12px;">Percorso log: -</p>
            <pre id="live-logs" class="log-console">Caricamento log...</pre>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/admin-logs.js}"></script>

</body>
</html>
