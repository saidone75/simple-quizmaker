<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Insegnante — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="login-screen">
    <div class="login-card">
        <div style="font-size:52px;text-align:center;margin-bottom:8px">👩‍🏫</div>
        <h1 class="login-title">Area Insegnante</h1>
        <p class="login-sub">Accedi per gestire i quiz</p>

        <div class="alert alert-error" th:if="${param.error}">
            ❌ Username o password errati.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            ✅ Logout effettuato con successo.
        </div>

        <form th:action="@{/admin/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="input-field" placeholder="Username"
                       autofocus required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="input-field" placeholder="Password"
                       required>
            </div>

            <button type="submit" class="btn-start-quiz" style="margin-top:1.25rem">
                🔐 Accedi
            </button>
        </form>

        <p style="text-align:center;margin-top:1.25rem;">
            <a th:href="@{/}" style="font-size:14px;color:var(--gray-muted);font-weight:700;text-decoration:none;">
                ← Torna alla pagina alunni
            </a>
        </p>
    </div>
</div>
</body>
</html>
