<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="quizmaker-theme-preference" th:content="${teacherThemePreference}">
    <title>System — QuizMaker</title>
    <script th:src="@{/js/theme-init.js}"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="screen active" style="display:block;">
    <div class="topbar">
        <span class="topbar-title">🛠️ System</span>
        <a th:href="@{/teacher}" class="topbar-back" style="text-decoration:none">← Dashboard</a>
        <span class="topbar-badge" sec:authentication="name">admin</span>
        <form th:action="@{/teacher/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="topbar-back">Logout</button>
        </form>
    </div>

    <div class="teacher-body" style="max-width:900px;">
        <div class="home-buttons" style="margin-bottom:1.5rem">
            <a th:href="@{/teacher/system/teachers}" class="btn-hero btn-student" style="text-decoration:none">
                <span class="btn-icon">👩‍🏫</span>
                <span>
                    <span class="btn-label">Gestione insegnanti</span>
                    <span class="btn-desc">Controlla gli insegnanti registrati e i permessi admin</span>
                </span>
            </a>
            <a th:href="@{/teacher/system/about}" class="btn-hero btn-teacher" style="text-decoration:none">
                <span class="btn-icon">ℹ️</span>
                <span>
                    <span class="btn-label">Informazioni sul sistema</span>
                    <span class="btn-desc">Versione app, JVM, memoria e host</span>
                </span>
            </a>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
