<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div id="screen-admin" class="screen active" style="background:var(--gray-bg);min-height:100vh;">

    <!-- TOPBAR -->
    <div class="topbar">
        <span class="topbar-title">🎓 QuizMaker Admin</span>
        <div style="display:flex;gap:8px;align-items:center;">
            <span class="topbar-badge" sec:authentication="name">admin</span>
            <form th:action="@{/admin/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="topbar-back">Logout</button>
            </form>
        </div>
    </div>

    <!-- BODY -->
    <div class="teacher-body">

        <!-- HOME ADMIN CARDS -->
        <div class="home-buttons" style="margin-bottom:1.5rem">
            <a th:href="@{/admin/quiz/new}" class="btn-hero btn-teacher" style="text-decoration:none">
                <span class="btn-icon">✏️</span>
                <span>
                    <span class="btn-label">Crea nuovo quiz</span>
                    <span class="btn-desc">Aggiungi un nuovo quiz per la classe</span>
                </span>
            </a>
            <a th:href="@{/}" target="_blank" class="btn-hero btn-student" style="text-decoration:none">
                <span class="btn-icon">🎒</span>
                <span>
                    <span class="btn-label">Vedi pagina alunni</span>
                    <span class="btn-desc">Apri la pagina degli alunni in una nuova scheda</span>
                </span>
            </a>
        </div>

        <!-- QUIZ LIST -->
        <div class="section-label">Quiz esistenti (<span th:text="${quizzes.size()}">0</span>)</div>

        <div id="manage-list" class="manage-list" th:if="${!quizzes.isEmpty()}">
            <div class="manage-card" th:each="quiz : ${quizzes}">
                <span class="manage-card-icon" th:text="${quiz.emoji}">🦕</span>
                <div class="manage-card-info">
                    <div class="manage-card-title" th:text="${quiz.title}">Titolo</div>
                    <div class="manage-card-meta">
                        Creato il <span th:text="${#temporals.format(quiz.createdAt, 'dd/MM/yyyy')}">01/01/2024</span>
                    </div>
                </div>
                <div class="manage-card-actions">
                    <a th:href="@{/admin/quiz/{id}/edit(id=${quiz.id})}"
                       class="btn-icon-action btn-edit-quiz" title="Modifica">✏️</a>
                    <button class="btn-icon-action btn-delete-quiz" title="Elimina"
                            th:data-id="${quiz.id}"
                            th:data-title="${quiz.title}"
                            onclick="confirmDelete(this.dataset.id, this.dataset.title)">🗑</button>
                </div>
            </div>
        </div>

        <div class="manage-empty" th:if="${quizzes.isEmpty()}">
            <span>📭</span>
            Nessun quiz ancora. Creane uno!
        </div>

    </div>
</div>

<!-- DELETE MODAL -->
<div id="delete-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <span class="modal-emoji">🗑️</span>
        <p class="modal-title">Eliminare il quiz?</p>
        <p class="modal-sub" id="modal-sub-text"></p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" onclick="closeDeleteModal()">Annulla</button>
            <button class="btn-modal btn-modal-confirm" id="modal-confirm-btn">Elimina</button>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ '';

    function confirmDelete(id, title) {
        document.getElementById('modal-sub-text').textContent =
            'Stai per eliminare "' + title + '". Questa azione non può essere annullata.';
        document.getElementById('modal-confirm-btn').onclick = () => doDelete(id);
        document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
        document.getElementById('delete-modal').style.display = 'none';
    }

    async function doDelete(id) {
        closeDeleteModal();
        showLoading('Eliminazione in corso...');
        try {
            const res = await fetch('/api/quizzes/' + id, {
                method: 'DELETE',
                headers: { [CSRF_HEADER]: CSRF_TOKEN }
            });
            if (!res.ok) throw new Error('Errore server');
            hideLoading();
            showToast('Quiz eliminato!');
            setTimeout(() => location.reload(), 1000);
        } catch(e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }
</script>
</body>
</html>
