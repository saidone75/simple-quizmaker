<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studenti della classe — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        @media print {
            .no-print,
            .print-hide {
                display: none !important;
            }

            body {
                background: #fff !important;
            }

            .teacher-body {
                max-width: 100%;
                padding: 0;
            }

            .students-print-card {
                border: none !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

<div id="screen-admin" class="screen active" style="background:var(--gray-bg);min-height:100vh;">
    <div class="topbar no-print">
        <span class="topbar-title">👨‍🎓 Studenti della classe</span>
        <div style="display:flex;gap:8px;align-items:center;">
            <a th:href="@{/admin}" class="topbar-back" style="text-decoration:none">← Dashboard</a>
            <button type="button" class="topbar-back no-print" onclick="printStudentsTable()">🖨️ Stampa</button>
            <span class="topbar-badge" sec:authentication="name">admin</span>
            <form th:action="@{/admin/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="topbar-back">Logout</button>
            </form>
        </div>
    </div>

    <div class="teacher-body">
        <div class="quiz-card no-print" style="margin-bottom:14px;">
            <form onsubmit="createStudent(event)" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <input id="new-student-name" class="input-field" style="max-width:320px" placeholder="Nome studente" required>
                <button class="quiz-next" style="display:block;padding:10px 18px;">Aggiungi studente</button>
            </form>
            <p style="margin-top:8px;color:#64748b">Verrà generata automaticamente una parola chiave univoca di 4 caratteri.</p>
        </div>

        <div class="students-print-card" style="overflow:auto;background:#fff;border-radius:14px;border:1px solid #e5e7eb;" th:if="${!students.isEmpty()}">
            <div class="result-group-header no-print" style="padding:10px 12px;border-bottom:1px solid #eef2f7;">
                <h2 style="font-size:1rem;">
                    <span>🔐</span>
                    <span>Password studenti</span>
                </h2>
                <button class="btn-unlock-all" onclick="regenerateAllStudentPasswords()">
                    🔐 Rigenera tutte le password
                </button>
            </div>
            <table style="width:100%;border-collapse:collapse;min-width:480px;">
                <thead>
                <tr style="background:#f8fafc">
                    <th style="text-align:left;padding:10px 12px;">Studente</th>
                    <th style="text-align:left;padding:10px 12px;">Parola chiave</th>
                    <th class="print-hide" style="text-align:left;padding:10px 12px;">Azione</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students}">
                    <td style="padding:10px 12px;border-top:1px solid #eef2f7" th:text="${student.fullName}">Mario Rossi</td>
                    <td style="padding:10px 12px;border-top:1px solid #eef2f7;font-weight:800;letter-spacing:0.08rem" th:text="${student.loginKeyword}">ABCD</td>
                    <td class="print-hide" style="padding:10px 12px;border-top:1px solid #eef2f7">
                        <div class="student-actions">
                            <button class="btn-regenerate-password"
                                    title="Rigenera parola chiave"
                                    th:data-id="${student.id}"
                                    onclick="regenerateStudentPassword(this.dataset.id)">🔐 Rigenera password</button>
                            <button class="btn-icon-action btn-delete-quiz"
                                    title="Elimina studente"
                                    th:data-id="${student.id}"
                                    th:data-name="${student.fullName}"
                                    onclick="deleteStudent(this.dataset.id, this.dataset.name)">🗑</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="manage-empty" th:if="${students.isEmpty()}">
            <span>👧</span>
            Non è stato ancora inserito alcuno studente.
        </div>
    </div>
</div>

<div id="delete-student-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <span class="modal-emoji">🗑️</span>
        <p class="modal-title">Eliminare lo studente?</p>
        <p class="modal-sub" id="delete-student-modal-sub"></p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" onclick="closeDeleteStudentModal()">Annulla</button>
            <button class="btn-modal btn-modal-confirm" id="delete-student-confirm-btn">Elimina</button>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ '';

    function printStudentsTable() {
        window.print();
    }

    async function createStudent(event) {
        event.preventDefault();
        const input = document.getElementById('new-student-name');
        const fullName = (input.value || '').trim();
        if (!fullName) return;

        showLoading('Creazione studente...');
        try {
            const res = await fetch('/api/students', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [CSRF_HEADER]: CSRF_TOKEN
                },
                body: JSON.stringify({ fullName })
            });
            const payload = await res.json();
            if (!res.ok) throw new Error(payload.message || 'Errore server');
            hideLoading();
            showToast('Studente creato: ' + payload.loginKeyword);
            setTimeout(() => location.reload(), 700);
        } catch (e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }

    function deleteStudent(studentId, studentName) {
        document.getElementById('delete-student-modal-sub').textContent =
            'Stai per eliminare "' + studentName + '". Questa azione non può essere annullata.';
        document.getElementById('delete-student-confirm-btn').onclick = () => doDeleteStudent(studentId);
        document.getElementById('delete-student-modal').style.display = 'flex';
    }

    function closeDeleteStudentModal() {
        document.getElementById('delete-student-modal').style.display = 'none';
    }

    async function doDeleteStudent(studentId) {
        closeDeleteStudentModal();
        showLoading('Eliminazione studente...');
        try {
            const res = await fetch('/api/students/' + studentId, {
                method: 'DELETE',
                headers: { [CSRF_HEADER]: CSRF_TOKEN }
            });
            if (!res.ok) {
                const payload = await res.json();
                throw new Error(payload.message || 'Errore server');
            }
            hideLoading();
            showToast('Studente eliminato');
            setTimeout(() => location.reload(), 700);
        } catch (e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }

    async function regenerateStudentPassword(studentId) {
        showLoading('Rigenerazione password...');
        try {
            const res = await fetch('/api/students/' + studentId + '/regenerate-password', {
                method: 'POST',
                headers: { [CSRF_HEADER]: CSRF_TOKEN }
            });
            if (!res.ok) {
                const payload = await res.json();
                throw new Error(payload.message || 'Errore server');
            }
            const payload = await res.json();
            hideLoading();
            showToast('Nuova parola chiave: ' + payload.loginKeyword);
            setTimeout(() => location.reload(), 900);
        } catch (e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }

    async function regenerateAllStudentPasswords() {
        showLoading('Rigenerazione password per tutti...');
        try {
            const res = await fetch('/api/students/regenerate-passwords', {
                method: 'POST',
                headers: { [CSRF_HEADER]: CSRF_TOKEN }
            });
            if (!res.ok) throw new Error('Errore server');
            const regeneratedCount = await res.json();
            hideLoading();
            showToast('Password rigenerate per ' + regeneratedCount + ' studenti');
            setTimeout(() => location.reload(), 700);
        } catch (e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }
</script>
</body>
</html>
