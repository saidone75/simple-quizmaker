<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studenti della classe — QuizMaker</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        @media print {
            .no-print,
            .print-hide {
                display: none !important;
            }

            body {
                background: #fff !important;
            }

            .teacher-body {
                max-width: 100%;
                padding: 0;
            }

            .students-print-card {
                border: none !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>

<div id="screen-admin" class="screen active" style="background:var(--gray-bg);min-height:100vh;">
    <div class="topbar no-print">
        <span class="topbar-title">👨‍🎓 Studenti della classe</span>
        <div class="topbar-actions">
            <a th:href="@{/teacher}" class="topbar-back" style="text-decoration:none">← Dashboard</a>
            <button type="button" class="topbar-back no-print" id="print-students-btn">🖨️ Stampa</button>
            <span class="topbar-badge" sec:authentication="name">admin</span>
            <form th:action="@{/teacher/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="topbar-back">Logout</button>
            </form>
        </div>
    </div>

    <div class="teacher-body">
        <div class="quiz-card no-print" style="margin-bottom:14px;">
            <form id="create-student-form" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                <input id="new-student-name" class="input-field" style="max-width:320px" placeholder="Nome studente" required>
                <button class="quiz-next" style="display:block;padding:10px 18px;">Aggiungi studente</button>
            </form>
            <p style="margin-top:8px;color:#64748b">Verrà generata automaticamente una parola chiave univoca di 5 caratteri.</p>
        </div>

        <div class="students-print-card" style="overflow:auto;background:#fff;border-radius:14px;border:1px solid #e5e7eb;" th:if="${!students.isEmpty()}">
            <div class="result-group-header no-print" style="padding:10px 12px;border-bottom:1px solid #eef2f7;">
                <h2 style="font-size:1rem;">
                    <span>🔐</span>
                    <span>Password studenti</span>
                </h2>
                <button class="btn-unlock-all" id="regenerate-all-passwords-btn">
                    🔐 Rigenera tutte le password
                </button>
            </div>
            <table class="students-table">
                <thead>
                <tr style="background:#f8fafc">
                    <th style="text-align:left;padding:10px 12px;">Studente</th>
                    <th style="text-align:center;padding:10px 12px;">Parola chiave</th>
                    <th class="print-hide" style="text-align:center;padding:10px 12px;">Azione</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students}">
                    <td style="padding:10px 12px;border-top:1px solid #eef2f7" th:text="${student.fullName}">Mario Rossi</td>
                    <td class="js-copy-keyword"
                        style="padding:10px 12px;border-top:1px solid #eef2f7;font-weight:800;font-size:20px;letter-spacing:0.20rem;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;text-align:center;cursor:pointer;"
                        title="Clicca per copiare"
                        th:data-keyword="${student.loginKeyword}"
                        th:text="${student.loginKeyword}">ABCDE</td>
                    <td class="print-hide" style="padding:10px 12px;border-top:1px solid #eef2f7;text-align:right;">
                        <div class="student-actions">
                            <button class="btn-regenerate-password js-regenerate-student-password"
                                    title="Rigenera parola chiave"
                                    th:data-id="${student.id}">
                                <span class="btn-regenerate-icon-mobile" aria-hidden="true">🔁</span>
                                <span class="btn-regenerate-text">🔐 Rigenera password</span>
                            </button>
                            <button class="btn-icon-action btn-delete-quiz js-delete-student"
                                    title="Elimina studente"
                                    th:data-id="${student.id}"
                                    th:data-name="${student.fullName}">🗑</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="manage-empty" th:if="${students.isEmpty()}">
            <span>👧</span>
            Non è stato ancora inserito alcuno studente.
        </div>
    </div>
</div>

<div id="delete-student-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <span class="modal-emoji">🗑️</span>
        <p class="modal-title">Eliminare lo studente?</p>
        <p class="modal-sub" id="delete-student-modal-sub"></p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" id="close-delete-student-modal-btn">Annulla</button>
            <button class="btn-modal btn-modal-confirm" id="delete-student-confirm-btn">Elimina</button>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<meta name="quizmaker-csrf-token" th:content="${_csrf.token}">
<meta name="quizmaker-csrf-header" th:content="${_csrf.headerName}">
<script th:src="@{/js/admin-students.js}"></script>

</body>
</html>
