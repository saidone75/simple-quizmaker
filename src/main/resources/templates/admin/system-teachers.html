<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="quizmaker-theme-preference" th:content="${teacherThemePreference}">
    <title>System / Insegnanti — QuizMaker</title>
    <script>
        (function () {
            const profilePreference = document.querySelector('meta[name="quizmaker-theme-preference"]')?.content || '';
            let savedTheme = '';
            try {
                savedTheme = localStorage.getItem('quizmaker-theme') || '';
            } catch (error) {
                savedTheme = '';
            }
            const theme = profilePreference === 'light' || profilePreference === 'dark' || profilePreference === 'zenburn'
                ? profilePreference
                : (savedTheme === 'light' || savedTheme === 'dark' || savedTheme === 'zenburn' ? savedTheme : 'light');
            const preloadBackground = theme === 'dark' ? '#2F3939' : (theme === 'zenburn' ? '#2D2D2D' : '#F7F6F2');
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.backgroundColor = preloadBackground;
            document.documentElement.style.colorScheme = theme === 'light' ? 'light' : 'dark';
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<script>
    (function () {
        const theme = document.documentElement.getAttribute('data-theme');
        if (theme) {
            document.body.setAttribute('data-theme', theme);
            document.body.style.backgroundColor = theme === 'dark' ? '#2F3939' : (theme === 'zenburn' ? '#2D2D2D' : '#F7F6F2');
            document.body.style.colorScheme = theme === 'light' ? 'light' : 'dark';
        }
    })();
</script>
<div class="screen active" style="display:block;">
    <div class="topbar">
        <span class="topbar-title">👩‍🏫 Gestione insegnanti</span>
        <a th:href="@{/teacher/system}" class="topbar-back" style="text-decoration:none">← System</a>
        <span class="topbar-badge" sec:authentication="name">admin</span>
        <form th:action="@{/teacher/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="topbar-back">Logout</button>
        </form>
    </div>

    <div class="teacher-body" style="max-width:960px;">
        <div class="alert alert-success" th:if="${teacherResetSuccess}" th:text="${teacherResetSuccess}">
            Password resettata correttamente a changeme.
        </div>

        <div class="section-label">Insegnanti registrati (<span th:text="${teachers.size()}">0</span>)</div>

        <div class="manage-list" th:if="${!teachers.isEmpty()}">
            <div class="manage-card"
                 th:each="teacher : ${teachers}"
                 th:style="${teacher.id == currentTeacherId ? 'border:2px solid var(--blue);background:var(--blue-light);' : ''}">
                <span class="manage-card-icon" th:text="${teacher.admin ? '🛡️' : '👤'}">👤</span>
                <div class="manage-card-info">
                    <div class="manage-card-title">
                        <form th:action="@{/teacher/system/teachers/{id}/enabled(id=${teacher.id})}" method="post" class="teacher-enabled-toggle-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="enabled" th:value="${teacher.enabled}"/>
                            <label class="teacher-enabled-toggle-label"
                                   th:title="${teacher.id == currentTeacherId ? 'Non puoi disabilitare il tuo account' : (teacher.enabled ? 'Disabilita login insegnante' : 'Abilita login insegnante')}">
                                <input type="checkbox" th:checked="${teacher.enabled}"
                                       th:disabled="${teacher.id == currentTeacherId}">
                            </label>
                        </form>
                        <span th:text="${teacher.username}">username</span>
                        <span th:if="${teacher.id == currentTeacherId}" style="font-size:12px;color:#2f4f9d;margin-left:6px;">(tu)</span>
                    </div>
                    <div class="manage-card-meta">
                        Ruolo: <strong th:text="${teacher.admin ? 'Admin' : 'Teacher'}">Teacher</strong> · Registrato il
                        <span th:text="${#temporals.format(teacher.createdAt, 'dd/MM/yyyy')}">01/01/2026</span> ·
                        Login: <strong th:text="${teacher.enabled ? 'Abilitato' : 'Disabilitato'}">Abilitato</strong>
                    </div>
                </div>
                <div class="manage-card-actions teacher-manage-actions">
                    <form th:action="@{/teacher/system/teachers/{id}/ai(id=${teacher.id})}" method="post" class="teacher-ai-toggle-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="aiEnabled" th:value="${teacher.aiEnabled}"/>
                        <label class="teacher-ai-toggle-label">
                            <input type="checkbox" th:checked="${teacher.aiEnabled}">
                            AI attiva
                        </label>
                    </form>

                    <form th:action="@{/teacher/system/teachers/{id}/admin(id=${teacher.id})}" method="post" style="margin:0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="admin" th:value="${teacher.admin ? 'false' : 'true'}"/>
                        <button type="submit"
                                class="btn-teacher-action"
                                th:title="${teacher.admin ? 'Rimuovi ruolo admin' : 'Assegna ruolo admin'}"
                                th:text="${teacher.admin ? '⬇️ Admin' : '⬆️ Rendi admin'}"
                                th:disabled="${teacher.id == currentTeacherId}">
                            ⬆️ Rendi admin
                        </button>
                    </form>

                    <form th:action="@{/teacher/system/teachers/{id}/reset-password(id=${teacher.id})}" method="post" style="margin:0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-teacher-action" title="Resetta password a changeme">🔁 Reset password</button>
                    </form>

                    <form th:action="@{/teacher/system/teachers/{id}/delete(id=${teacher.id})}" method="post" style="margin:0"
                          th:attr="data-username=${teacher.username}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="button" class="btn-teacher-action btn-teacher-action-danger delete-teacher-btn"
                                th:disabled="${teacher.id == currentTeacherId}"
                                th:title="${teacher.id == currentTeacherId ? 'Non puoi cancellare utente corrente' : 'Elimina insegnante e tutti i dati associati'}">🗑️ Elimina</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="manage-empty" th:if="${teachers.isEmpty()}">
            <span>📭</span>
            Nessun insegnante registrato.
        </div>
    </div>
</div>
<div id="delete-teacher-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
        <span class="modal-emoji">🗑️</span>
        <p class="modal-title">Eliminare l'insegnante?</p>
        <p class="modal-sub" id="delete-teacher-modal-sub"></p>
        <div class="modal-btns">
            <button class="btn-modal btn-modal-cancel" id="delete-teacher-cancel-btn">Annulla</button>
            <button class="btn-modal btn-modal-confirm" id="delete-teacher-confirm-btn">Elimina</button>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/teacher-system.js}"></script>

</body>
</html>
