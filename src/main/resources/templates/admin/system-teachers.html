<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System / Insegnanti — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="screen active" style="display:block;">
    <div class="topbar">
        <span class="topbar-title">👩‍🏫 Gestione insegnanti</span>
        <a th:href="@{/teacher/system}" class="topbar-back" style="text-decoration:none">← System</a>
        <span class="topbar-badge" sec:authentication="name">admin</span>
        <form th:action="@{/teacher/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="topbar-back">Logout</button>
        </form>
    </div>

    <div class="teacher-body" style="max-width:960px;">
        <div class="section-label">Insegnanti registrati (<span th:text="${teachers.size()}">0</span>)</div>

        <div class="manage-list" th:if="${!teachers.isEmpty()}">
            <div class="manage-card"
                 th:each="teacher : ${teachers}"
                 th:style="${teacher.id == currentTeacherId ? 'border:2px solid #5b8cff;background:#eef4ff;' : ''}">
                <span class="manage-card-icon" th:text="${teacher.admin ? '🛡️' : '👤'}">👤</span>
                <div class="manage-card-info">
                    <div class="manage-card-title">
                        <span th:text="${teacher.username}">username</span>
                        <span th:if="${teacher.id == currentTeacherId}" style="font-size:12px;color:#2f4f9d;margin-left:6px;">(tu)</span>
                    </div>
                    <div class="manage-card-meta">
                        Ruolo: <strong th:text="${teacher.admin ? 'Admin' : 'Teacher'}">Teacher</strong> · Registrato il
                        <span th:text="${#temporals.format(teacher.createdAt, 'dd/MM/yyyy')}">01/01/2026</span>
                    </div>
                </div>
                <div class="manage-card-actions teacher-manage-actions">
                    <form th:action="@{/teacher/system/teachers/{id}/ai(id=${teacher.id})}" method="post" class="teacher-ai-toggle-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="aiEnabled" th:value="${teacher.aiEnabled}"/>
                        <label class="teacher-ai-toggle-label">
                            <input type="checkbox" th:checked="${teacher.aiEnabled}" onchange="submitAiToggle(this)">
                            AI attiva
                        </label>
                    </form>

                    <form th:action="@{/teacher/system/teachers/{id}/admin(id=${teacher.id})}" method="post" style="margin:0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="admin" th:value="${teacher.admin ? 'false' : 'true'}"/>
                        <button type="submit"
                                class="btn-teacher-action"
                                th:title="${teacher.admin ? 'Rimuovi ruolo admin' : 'Assegna ruolo admin'}"
                                th:text="${teacher.admin ? '⬇️ Admin' : '⬆️ Rendi admin'}"
                                th:disabled="${teacher.id == currentTeacherId}">
                            ⬆️ Rendi admin
                        </button>
                    </form>

                    <form th:action="@{/teacher/system/teachers/{id}/reset-password(id=${teacher.id})}" method="post" style="margin:0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-teacher-action" title="Resetta password a changeme">🔁 Reset password</button>
                    </form>

                    <form th:action="@{/teacher/system/teachers/{id}/delete(id=${teacher.id})}" method="post" style="margin:0"
                          onsubmit="return confirmTeacherDelete(this)"
                          th:attr="data-username=${teacher.username}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-teacher-action btn-teacher-action-danger"
                                th:disabled="${teacher.id == currentTeacherId}"
                                th:title="${teacher.id == currentTeacherId ? 'Non puoi cancellare utente corrente' : 'Elimina insegnante e tutti i dati associati'}">🗑️ Elimina</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="manage-empty" th:if="${teachers.isEmpty()}">
            <span>📭</span>
            Nessun insegnante registrato.
        </div>
    </div>
</div>
<script>
    function submitAiToggle(checkbox) {
        const form = checkbox.form;
        const hiddenInput = form.querySelector('input[name="aiEnabled"]');
        hiddenInput.value = checkbox.checked;
        form.submit();
    }

    function confirmTeacherDelete(form) {
        const username = form.dataset.username || "questo insegnante";
        return confirm(`Eliminare definitivamente ${username} e tutti i suoi dati?`);
    }
</script>
</body>
</html>
