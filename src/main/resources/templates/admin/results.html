<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risultati quiz — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div id="screen-admin" class="screen active" style="background:var(--gray-bg);min-height:100vh;">
    <div class="topbar">
        <span class="topbar-title">🧾 Risultati quiz</span>
        <div style="display:flex;gap:8px;align-items:center;">
            <a th:href="@{/admin}" class="topbar-back" style="text-decoration:none">← Dashboard</a>
            <span class="topbar-badge" sec:authentication="name">admin</span>
            <form th:action="@{/admin/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="topbar-back">Logout</button>
            </form>
        </div>
    </div>

    <div class="teacher-body">
        <div class="results-groups" th:if="${!groupedResults.isEmpty()}">
            <section class="result-group-card" th:each="group : ${groupedResults}">
                <div class="result-group-header">
                    <h2>
                        <span>📘</span>
                        <span th:text="${group.quizTitle}">Titolo quiz</span>
                    </h2>
                    <button class="btn-unlock-all" th:data-quiz-id="${group.quizId}"
                            onclick="unlockAllForQuiz(this.dataset.quizId)">
                        🔓 Sblocca tutti
                    </button>
                </div>

                <div class="results-table-wrap">
                    <table class="results-table">
                        <thead>
                        <tr>
                            <th>Data</th>
                            <th>Studente</th>
                            <th>Punteggio</th>
                            <th>Stato</th>
                            <th>Azione</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="result : ${group.results}">
                            <td th:text="${#temporals.format(result.submittedAt, 'dd/MM/yyyy HH:mm')}">01/01/2024 10:00</td>
                            <td th:text="${result.studentName}">Mario Rossi</td>
                            <td th:text="${result.score + '/' + result.totalQuestions}">8/10</td>
                            <td>
                                <span class="status-pill" th:classappend="${result.unlocked ? ' status-pill-unlocked' : ' status-pill-locked'}"
                                      th:text="${result.unlocked ? 'Sbloccato' : 'Bloccato'}">Bloccato</span>
                            </td>
                            <td>
                                <button class="btn-unlock-single"
                                        th:data-student-id="${result.studentId}"
                                        th:data-quiz-id="${result.quizId}"
                                        th:disabled="${result.unlocked}"
                                        onclick="unlockSubmission(this.dataset.studentId, this.dataset.quizId)">
                                    🔓 Sblocca
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <div class="manage-empty" th:if="${groupedResults.isEmpty()}">
            <span>🧾</span>
            Nessun risultato salvato.
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
    const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ '';

    async function unlockSubmission(studentId, quizId) {
        showLoading('Sblocco in corso...');
        try {
            const res = await fetch('/api/quizzes/' + quizId + '/unlock/' + studentId, {
                method: 'POST',
                headers: { [CSRF_HEADER]: CSRF_TOKEN }
            });
            if (!res.ok) throw new Error('Errore server');
            hideLoading();
            showToast('Quiz sbloccato per lo studente');
            setTimeout(() => location.reload(), 700);
        } catch (e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }

    async function unlockAllForQuiz(quizId) {
        showLoading('Sblocco quiz per tutti in corso...');
        try {
            const res = await fetch('/api/quizzes/' + quizId + '/unlock-all', {
                method: 'POST',
                headers: { [CSRF_HEADER]: CSRF_TOKEN }
            });
            if (!res.ok) throw new Error('Errore server');
            const unlockedCount = await res.json();
            hideLoading();
            showToast('Sbloccati ' + unlockedCount + ' studenti');
            setTimeout(() => location.reload(), 700);
        } catch (e) {
            hideLoading();
            alert('Errore: ' + e.message);
        }
    }
</script>
</body>
</html>
