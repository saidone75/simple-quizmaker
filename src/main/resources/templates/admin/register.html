<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Insegnante — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script th:if="${turnstileEnabled}" src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
<div class="login-screen">
    <div class="login-card">
        <div style="font-size:52px;text-align:center;margin-bottom:8px">📝</div>
        <h1 class="login-title">Registrazione Insegnante</h1>
        <p class="login-sub">Crea il tuo account per gestire classi e quiz</p>

        <div class="alert alert-error" th:if="${registerError}">
            <span th:text="${registerError}"></span>
        </div>

        <form th:action="@{/teacher/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="input-field" placeholder="Username" th:value="${username}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="input-field" placeholder="Almeno 6 caratteri" required>
            </div>

            <div class="form-group">
                <label class="form-label">Conferma password</label>
                <input type="password" name="confirmPassword" class="input-field" placeholder="Ripeti la password" required>
            </div>

            <div class="form-group" th:if="${turnstileEnabled}">
                <div class="cf-turnstile" data-theme="light" th:attr="data-sitekey=${turnstileSiteKey}"></div>
            </div>

            <button type="submit" class="btn-start-quiz" style="margin-top:1.25rem">
                🚀 Crea account
            </button>
        </form>

        <p style="text-align:center;margin-top:1.25rem;">
            <a th:href="@{/teacher/login}" style="font-size:14px;color:var(--gray-muted);font-weight:700;text-decoration:none;">
                ← Hai già un account? Accedi
            </a>
        </p>
    </div>
</div>
</body>
</html>
