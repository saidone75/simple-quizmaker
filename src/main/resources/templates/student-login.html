<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Studente — QuizMaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="screen active" style="display:flex;align-items:center;justify-content:center;">
    <div class="quiz-card" style="max-width:420px;width:92%;text-align:center;">
        <div style="font-size:52px;margin-bottom:12px">🔐</div>
        <h2>Accesso studenti</h2>
        <p>Inserisci la parola chiave di 6 caratteri assegnata dalla maestra.</p>
        <form th:action="@{/student/login}" method="post" style="display:grid;gap:12px;margin-top:14px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input class="input-field" type="text" name="keyword" maxlength="6" minlength="6" required
                   style="text-align:center;font-size:1.3rem;letter-spacing:0.18rem;text-transform:uppercase"
                   placeholder="ABC123"/>
            <button class="quiz-next" style="display:block">Entra</button>
        </form>
        <p th:if="${loginError}" th:text="${loginError}" style="margin-top:12px;color:#dc2626;font-weight:700"></p>
    </div>
</div>
</body>
</html>
