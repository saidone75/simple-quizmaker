<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaker 🦕</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<!-- STUDENT PICKER -->
<div id="screen-student" class="screen active">
    <div class="student-inner">
        <div style="font-size:52px;margin-bottom:12px">🎒</div>
        <h2>Scegli un quiz!</h2>
        <p>Seleziona il quiz che vuoi fare</p>

        <div class="quiz-picker" th:if="${!quizzes.isEmpty()}">
            <div class="quiz-pick-item"
                 th:each="quiz : ${quizzes}"
                 th:data-id="${quiz.id}"
                 onclick="startQuizFromCard(this)">
                <span class="quiz-pick-icon" th:text="${quiz.emoji}">🦕</span>
                <span>
                    <span class="quiz-pick-name" th:text="${quiz.title}">Titolo</span>
                    <span class="quiz-pick-count" th:text="${quiz.questionsCount} + ' domande'">domande</span>
                </span>
            </div>
        </div>

        <div class="no-quizzes" th:if="${quizzes.isEmpty()}">
            Nessun quiz disponibile.<br>Chiedi all'insegnante di crearne uno!
        </div>
    </div>
</div>

<!-- QUIZ PLAY -->
<div id="screen-quiz" class="screen">
    <div class="quiz-container">
        <div class="quiz-topbar">
            <span class="quiz-title-small" id="play-title">Quiz</span>
            <span class="quiz-score-badge" id="play-score">⭐ 0</span>
        </div>
        <div class="quiz-progress">
            <div class="quiz-progress-label">
                <span id="play-progress-text">Domanda 1 di ?</span>
                <span id="play-pct">0%</span>
            </div>
            <div class="quiz-progress-bg">
                <div class="quiz-progress-fill" id="play-progress-fill" style="width:0%"></div>
            </div>
        </div>
        <div id="play-area"></div>
    </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
    <div class="result-card">
        <span class="result-emoji" id="res-emoji">🏆</span>
        <p class="result-title" id="res-title">Perfetto!</p>
        <p class="result-subtitle" id="res-sub">Hai risposto a tutte le domande</p>
        <p class="result-score" id="res-score">10<span> / 10</span></p>
        <span class="result-stars" id="res-stars">⭐⭐⭐⭐⭐</span>
        <div class="result-pills" id="res-pills"></div>
        <div class="result-btns">
            <button class="btn-retry btn-retry-play" onclick="replayQuiz()">🔄 Riprova</button>
            <button class="btn-retry btn-retry-home" onclick="goTo('student')">🎒 Scegli un altro quiz</button>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/quiz-player.js}"></script>
<script th:inline="javascript">
    const QUIZ_DATA = /*[[${quizzes}]]*/ [];
    window.QUIZ_DATA_BY_ID = Object.fromEntries(
        QUIZ_DATA.map(quiz => [String(quiz.id), quiz])
    );
</script>
</body>
</html>
