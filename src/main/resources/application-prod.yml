spring:
  datasource:
    # Set these environment variables in production:
    # SUPABASE_DB_URL, SUPABASE_DB_USERNAME, SUPABASE_DB_PASSWORD
    url: ${SUPABASE_DB_URL:jdbc:postgresql://db.ktxzqabmnqenmnprgfds.supabase.co:5432/postgres}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  h2:
    console:
      enabled: false
  liquibase:
    enabled: true
logging:
  level:
    root: INFO