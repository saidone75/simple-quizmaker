spring:
  datasource:
    # Set this environment variable in production if you want a custom DB path.
    # Example: PROD_SQLITE_DB_URL=jdbc:sqlite:/opt/quizmaker/data/quizmaker-prod.db
    url: ${PROD_SQLITE_DB_URL:jdbc:sqlite:./data/quizmaker-prod.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  h2:
    console:
      enabled: true
  liquibase:
    enabled: true
logging:
  level:
    root: INFO
