spring:
  datasource:
    # Set this environment variable in production if you want a custom DB path.
    # Example: PROD_SQLITE_DB_URL=jdbc:sqlite:/opt/quizmaker/data/quizmaker.db
    url: ${PROD_SQLITE_DB_URL:jdbc:sqlite:./data/quizmaker.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  thymeleaf:
    cache: true
  h2:
    console:
      enabled: false
  liquibase:
    enabled: ${LIQUIBASE_ENABLED:false}

server:
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict

app:
  db-backup:
    enabled: ${DB_BACKUP_ENABLED:true}

logging:
  level:
    com.zaxxer.hikari: WARN
    liquibase: WARN
    org.hibernate: WARN
