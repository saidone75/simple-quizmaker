spring:
  application:
    name: quizmaker
  output:
    ansi:
      enabled: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true
  thymeleaf:
    cache: false
    encoding: UTF-8
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:changeme}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.4-mini}
    max-attachment-chars: ${OPENAI_MAX_ATTACHMENT_CHARS:60000}
  db-backup:
    enabled: ${DB_BACKUP_ENABLED:false}
    cron: ${DB_BACKUP_CRON:0 0 2 * * *}
    directory: ${DB_BACKUP_DIRECTORY:./backups}
    retention-count: ${DB_BACKUP_RETENTION_COUNT:30}
  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
    site-key: ${TURNSTILE_SITE_KEY:}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}

logging:
  level:
    root: INFO
