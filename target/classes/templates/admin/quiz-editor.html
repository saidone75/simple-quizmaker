<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${quiz != null ? 'Modifica Quiz' : 'Nuovo Quiz'} + ' — QuizMaker'">Quiz Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div id="screen-editor" class="screen active" style="background:var(--gray-bg);min-height:100vh;">

    <!-- TOPBAR -->
    <div class="topbar">
        <a th:href="@{/admin}" class="topbar-back" style="text-decoration:none">← Indietro</a>
        <span class="topbar-title" th:text="${quiz != null ? '✏️ Modifica Quiz' : '✏️ Nuovo Quiz'}">✏️ Quiz</span>
        <span class="topbar-badge" id="q-count-badge">0 domande</span>
    </div>

    <!-- BODY -->
    <div class="teacher-body">

        <div class="section-label">Nome del quiz</div>
        <input type="text" id="quiz-title-input" class="input-field"
               placeholder="Es: Quiz sulla Preistoria 🦕"
               th:value="${quiz?.title}"
               oninput="updateBadge()">

        <div class="section-label" style="margin-top:1.25rem">Emoji del quiz</div>
        <input type="text" id="quiz-emoji-input" class="input-field"
               placeholder="Es: 🦕" maxlength="4" style="width:80px"
               th:value="${quiz?.emoji}">

        <div class="section-label" style="margin-top:1.25rem">Domande</div>
        <div id="questions-list" class="questions-list"></div>
        <button class="btn-add-question" onclick="addQuestion()">+ Aggiungi domanda</button>

        <div id="validation-msg" class="validation-msg"></div>
        <button class="btn-start-quiz" id="save-btn" onclick="saveQuiz()">
            <span th:text="${quiz != null ? '💾 Salva modifiche' : '🚀 Salva quiz'}">Salva</span>
        </button>

    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/quiz-editor.js}"></script>
<script th:inline="javascript">
    // Dati passati da Spring al JS
    const QUIZ_ID = /*[[${quiz?.id}]]*/ null;
    const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

    // Se stiamo modificando, carichiamo le domande esistenti
    const INITIAL_QUESTIONS_JSON = /*[[${quiz?.questions}]]*/ null;

    document.addEventListener('DOMContentLoaded', () => {
        initEditor(QUIZ_ID, INITIAL_QUESTIONS_JSON);
    });
</script>
</body>
</html>
